name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@v5

      - name: Install pipeline dependencies
        working-directory: pipeline
        run: uv sync --all-groups

      - name: Run tests
        working-directory: pipeline
        run: uv run pytest
